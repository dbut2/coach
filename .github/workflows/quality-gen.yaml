name: Quality (Gen)

on:
  push:
    branches:
      - main
  pull_request:
  merge_group:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gen:
    name: ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [gen-sql, gen-strava, gen-templ]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: tools/go.mod
          cache-dependency-path: tools/go.sum
      - run: make ${{ matrix.target }}
      - run: git diff --exit-code

  gate:
    name: Gen Gate
    runs-on: ubuntu-latest
    needs: gen
    if: always()
    steps:
      - run: |
          if [ "${{ needs.gen.result }}" != "success" ]; then
            echo "gen job did not succeed: ${{ needs.gen.result }}"
            exit 1
          fi
