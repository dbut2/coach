name: Quality (Go)

on:
  push:
    branches:
      - main
  pull_request:
  merge_group:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_DIRS: |
    go: go/**
    tools: tools/**

jobs:
  dirs:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.changed.outputs.changes }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: changed
        with:
          filters: ${{ env.GO_DIRS }}

  test:
    name: Go Test
    runs-on: ubuntu-latest
    needs: dirs
    strategy:
      matrix:
        dir: ${{ fromJSON(needs.dirs.outputs.matrix) }}
    defaults:
      run:
        working-directory: ${{ matrix.dir }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: ${{ matrix.dir }}/go.mod
          cache-dependency-path: ${{ matrix.dir }}/go.sum
      - run: go mod download
      - run: go test -v ./...

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    needs: dirs
    strategy:
      matrix:
        dir: ${{ fromJSON(needs.dirs.outputs.matrix) }}
    defaults:
      run:
        working-directory: ${{ matrix.dir }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: ${{ matrix.dir }}/go.mod
          cache-dependency-path: ${{ matrix.dir }}/go.sum
      - run: go mod download
      - uses: golangci/golangci-lint-action@v9
        with:
          working-directory: ${{ matrix.dir }}

  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: dirs
    strategy:
      matrix:
        dir: ${{ fromJSON(needs.dirs.outputs.matrix) }}
    defaults:
      run:
        working-directory: ${{ matrix.dir }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: ${{ matrix.dir }}/go.mod
          cache-dependency-path: ${{ matrix.dir }}/go.sum
      - run: go mod download
      - run: go build ./...

  tidy:
    name: Go Mod Tidy
    runs-on: ubuntu-latest
    needs: dirs
    strategy:
      matrix:
        dir: ${{ fromJSON(needs.dirs.outputs.matrix) }}
    defaults:
      run:
        working-directory: ${{ matrix.dir }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: ${{ matrix.dir }}/go.mod
          cache-dependency-path: ${{ matrix.dir }}/go.sum
      - run: go mod tidy
      - run: git diff --exit-code go.mod go.sum

  gate:
    name: Go Gate
    runs-on: ubuntu-latest
    needs: [dirs, test, lint, build, tidy]
    if: always()
    steps:
      - run: |
          if [ "${{ needs.dirs.result }}" != "success" ]; then
            echo "dirs job did not succeed: ${{ needs.dirs.result }}"
            exit 1
          fi
          if [ '${{ needs.dirs.outputs.matrix }}' = '[]' ]; then
            echo "No Go directories changed; nothing to verify."
            exit 0
          fi
          for r in "${{ needs.test.result }}" "${{ needs.lint.result }}" "${{ needs.build.result }}" "${{ needs.tidy.result }}"; do
            if [ "$r" != "success" ]; then
              echo "Required job result: $r"
              exit 1
            fi
          done
