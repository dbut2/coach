name: Quality (Go)

on:
  push:
    branches:
      - main
  pull_request:
  merge_group:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_DIRS: |
    - go
    - tools

jobs:
  dirs:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.changed.outputs.changes }}
    steps:
      - uses: actions/checkout@v6
      - id: filters
        run: |
          {
            echo 'filters<<EOF'
            yq 'reduce .[] as $d ({}; .[$d] = $d + "/**")' <<< "$GO_DIRS"
            echo EOF
          } >> "$GITHUB_OUTPUT"
      - uses: dorny/paths-filter@v3
        id: changed
        with:
          filters: ${{ steps.filters.outputs.filters }}

  test:
    name: Go Test
    runs-on: ubuntu-latest
    needs: dirs
    strategy:
      matrix:
        dir: ${{ fromJSON(needs.dirs.outputs.matrix) }}
    defaults:
      run:
        working-directory: ${{ matrix.dir }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: ${{ matrix.dir }}/go.mod
          cache-dependency-path: ${{ matrix.dir }}/go.sum
      - run: go mod download
      - run: go test -v ./...

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    needs: dirs
    strategy:
      matrix:
        dir: ${{ fromJSON(needs.dirs.outputs.matrix) }}
    defaults:
      run:
        working-directory: ${{ matrix.dir }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: ${{ matrix.dir }}/go.mod
          cache-dependency-path: ${{ matrix.dir }}/go.sum
      - run: go mod download
      - uses: golangci/golangci-lint-action@v9
        with:
          working-directory: ${{ matrix.dir }}

  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: dirs
    strategy:
      matrix:
        dir: ${{ fromJSON(needs.dirs.outputs.matrix) }}
    defaults:
      run:
        working-directory: ${{ matrix.dir }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: ${{ matrix.dir }}/go.mod
          cache-dependency-path: ${{ matrix.dir }}/go.sum
      - run: go mod download
      - run: go build ./...

  tidy:
    name: Go Mod Tidy
    runs-on: ubuntu-latest
    needs: dirs
    strategy:
      matrix:
        dir: ${{ fromJSON(needs.dirs.outputs.matrix) }}
    defaults:
      run:
        working-directory: ${{ matrix.dir }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: ${{ matrix.dir }}/go.mod
          cache-dependency-path: ${{ matrix.dir }}/go.sum
      - run: go mod tidy
      - run: git diff --exit-code go.mod go.sum
