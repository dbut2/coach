version: 2
updates:
  - package-ecosystem: gomod
    directories:
      - go
      - tools
    schedule:
      interval: daily
      time: "06:00"
      timezone: Australia/Melbourne
    groups:
      go:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
      time: "06:00"
      timezone: Australia/Melbourne
